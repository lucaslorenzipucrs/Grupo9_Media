name: Media Service Tests

on:
  push:
    paths:
      - "plus-ms-media/**"

  pull_request:
    paths:
      - "plus-ms-media/**"

jobs:
  tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: plus-ms-media

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest -v